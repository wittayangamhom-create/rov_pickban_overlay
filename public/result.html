<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>ROV Draft Result Overlay</title>
    <link rel="stylesheet" href="css/result.css">
</head>
<body>
    <div class="result-container">

        <!-- ===== BLUE TEAM (top half) ===== -->
        <div class="team-section blue">
            <!-- Team header: name + bans -->
            <div class="team-header">
                <div class="team-logo-name">
                    <div class="team-name-text" id="blueNameResult">BLUE TEAM</div>
                </div>
                <div class="ban-row">
                    <div class="ban-label-badge">BAN</div>
                    <div class="ban-icons" id="blueBanIconsResult">
                        <div class="ban-icon-slot" id="blueResultBan0"></div>
                        <div class="ban-icon-slot" id="blueResultBan1"></div>
                        <div class="ban-icon-slot" id="blueResultBan2"></div>
                        <div class="ban-icon-slot" id="blueResultBan3"></div>
                    </div>
                </div>
            </div>

            <!-- Pick cards -->
            <div class="picks-row">
                <div class="pick-card" id="bluePick0Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="blueHeroArt0" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="blueResultPlayer0">PLAYER 1</div>
                    </div>
                </div>
                <div class="pick-card" id="bluePick1Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="blueHeroArt1" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="blueResultPlayer1">PLAYER 2</div>
                    </div>
                </div>
                <div class="pick-card" id="bluePick2Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="blueHeroArt2" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="blueResultPlayer2">PLAYER 3</div>
                    </div>
                </div>
                <div class="pick-card" id="bluePick3Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="blueHeroArt3" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="blueResultPlayer3">PLAYER 4</div>
                    </div>
                </div>
                <div class="pick-card" id="bluePick4Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="blueHeroArt4" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="blueResultPlayer4">PLAYER 5</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- center divider -->
        <div class="center-divider"></div>

        <!-- ===== RED TEAM (bottom half) ===== -->
        <div class="team-section red">
            <!-- Team header: name + bans -->
            <div class="team-header">
                <div class="team-logo-name">
                    <div class="team-name-text" id="redNameResult">RED TEAM</div>
                </div>
                <div class="ban-row">
                    <div class="ban-label-badge">BAN</div>
                    <div class="ban-icons" id="redBanIconsResult">
                        <div class="ban-icon-slot" id="redResultBan0"></div>
                        <div class="ban-icon-slot" id="redResultBan1"></div>
                        <div class="ban-icon-slot" id="redResultBan2"></div>
                        <div class="ban-icon-slot" id="redResultBan3"></div>
                    </div>
                </div>
            </div>

            <!-- Pick cards -->
            <div class="picks-row">
                <div class="pick-card" id="redPick0Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="redHeroArt0" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="redResultPlayer0">PLAYER 1</div>
                    </div>
                </div>
                <div class="pick-card" id="redPick1Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="redHeroArt1" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="redResultPlayer1">PLAYER 2</div>
                    </div>
                </div>
                <div class="pick-card" id="redPick2Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="redHeroArt2" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="redResultPlayer2">PLAYER 3</div>
                    </div>
                </div>
                <div class="pick-card" id="redPick3Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="redHeroArt3" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="redResultPlayer3">PLAYER 4</div>
                    </div>
                </div>
                <div class="pick-card" id="redPick4Result">
                    <div class="pick-card-empty-icon">?</div>
                    <img class="hero-art" id="redHeroArt4" src="" alt="">
                    <div class="pick-card-footer">
                        <div class="pick-player-name" id="redResultPlayer4">PLAYER 5</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/result.js"></script>
</body>
</html>
