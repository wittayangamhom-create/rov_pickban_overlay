<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROV Control Panel</title>
<style>
:root{--bg:#0b0c14;--s1:#111220;--s2:#181929;--s3:#1e2035;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--blue:#3b82f6;--red:#ef4444;--gold:#f59e0b;--purple:#8b5cf6;--green:#10b981;--text:#e2e8f0;--muted:#4a5568;--muted2:#64748b;--hf:'Arial Narrow','Segoe UI Condensed','Segoe UI',Arial,sans-serif;--bf:'Segoe UI',Arial,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--bf);background:var(--bg);color:var(--text);min-height:100vh;}

/* TOP BAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--hf);font-size:18px;font-weight:900;letter-spacing:3px;color:var(--blue);white-space:nowrap;}
.logo span{color:rgba(255,255,255,0.3);}
.match-inputs{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.match-inputs input{background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 10px;font-family:var(--bf);font-size:13px;font-weight:600;transition:border-color 0.2s;}
.match-inputs input:focus{outline:none;border-color:var(--blue);}
.match-inputs input:nth-child(1){width:185px;}
.match-inputs input:nth-child(2){width:265px;}
.topbar-links{margin-left:auto;display:flex;gap:8px;align-items:center;}
.overlay-link-group{display:flex;gap:8px;align-items:center;}
.overlay-url-item{display:flex;align-items:center;gap:3px;}
.overlay-url-item .tlink:first-child{border-radius:6px 3px 3px 6px;}
.copy-url-btn{width:28px;height:28px;padding:0;border-radius:3px 6px 6px 3px;font-size:15px;line-height:1;color:#94a3b8;display:inline-flex;align-items:center;justify-content:center;letter-spacing:0;}
.copy-url-btn:hover{color:var(--green);border-color:var(--green);}
.tlink{padding:5px 13px;border-radius:6px;font-family:var(--hf);font-size:12px;font-weight:800;letter-spacing:1px;cursor:pointer;border:1px solid var(--border2);background:var(--s3);color:var(--muted2);transition:all 0.2s;text-decoration:none;}
.tlink:hover{color:var(--blue);border-color:var(--blue);}
.preset-tools{display:flex;align-items:center;gap:6px;min-width:0;}
.preset-tools input,.preset-tools select{height:29px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:4px 8px;font-family:var(--bf);font-size:12px;font-weight:600;min-width:110px;}
.preset-tools input{width:120px;}
.preset-tools select{width:130px;}
.preset-tools input:focus,.preset-tools select:focus{outline:none;border-color:var(--blue);}

/* MAIN GRID */
.main{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;max-width:1600px;margin:0 auto;}

/* PANEL */
.panel{background:var(--s1);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.panel.blue-panel{border-top:3px solid var(--blue);}
.panel.red-panel{border-top:3px solid var(--red);}
.panel.full{grid-column:1/-1;}
.panel.draft-panel{border-top:3px solid var(--purple);}
.panel-head{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--s2);border-bottom:1px solid var(--border);}
.panel-title{font-family:var(--hf);font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.score-badge{margin-left:auto;display:flex;align-items:center;gap:8px;}
.score-badge label{font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;}
.score-input{width:52px;text-align:center;font-family:var(--hf);font-size:20px;font-weight:900;padding:3px 4px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:6px;}
.score-input:focus{outline:none;border-color:var(--blue);}
.panel-body{padding:12px 14px;}

/* TEAM META */
.team-meta{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;margin-bottom:12px;}
.field label{display:block;font-size:10px;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;margin-bottom:4px;}
.field input{width:100%;padding:7px 10px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:7px;font-family:var(--bf);font-size:13px;font-weight:600;transition:border-color 0.2s;}
.field input:focus{outline:none;border-color:var(--blue);}

/* PP TABLE */
.pp-table{width:100%;border-collapse:separate;border-spacing:0 3px;}
.pp-table thead th{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:0 4px 5px;font-weight:700;}
.pp-row td{padding:0 3px;}
.pp-row .player-input{width:100%;padding:7px 10px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:7px;font-family:var(--bf);font-size:13px;font-weight:600;transition:border-color 0.2s;}
.pp-row .player-input:focus{outline:none;border-color:var(--blue);}

/* Hero selector */
.hero-select-wrap{min-width:110px;}
.hero-native-select{width:100%;height:33px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:0 8px;font-family:var(--bf);font-size:13px;font-weight:600;transition:border-color 0.2s;}
.hero-native-select:focus{outline:none;border-color:var(--blue);}
.hero-native-select option{background:var(--s2);color:var(--text);}
.hero-search-input{width:100%;height:33px;background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:0 9px;font-family:var(--bf);font-size:13px;font-weight:700;transition:border-color 0.2s,box-shadow 0.2s;}
.hero-search-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,0.22);}
.hero-search-input::placeholder{color:var(--muted2);font-weight:600;}

/* SWAP button */
.btn-sw{padding:5px 8px;border-radius:5px;font-family:var(--hf);font-size:11px;font-weight:800;letter-spacing:1px;border:none;cursor:pointer;background:var(--purple);color:#fff;transition:background 0.15s;white-space:nowrap;}
.btn-sw:hover{background:#7c3aed;}
.btn-sw.cancel-mode{background:#dc2626;animation:swGlow 0.6s ease-in-out infinite alternate;}
@keyframes swGlow{from{box-shadow:0 0 0 rgba(220,38,38,0.5);}to{box-shadow:0 0 10px rgba(220,38,38,0.8);}}
.active-row .player-input{box-shadow:0 0 0 2px var(--gold);border-color:var(--gold) !important;}

/* BAN SECTION */
.ban-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ban-label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ban-label-row span{font-family:var(--hf);font-size:11px;font-weight:800;letter-spacing:2px;color:var(--red);padding:2px 8px;background:rgba(239,68,68,0.1);border-radius:4px;border:1px solid rgba(239,68,68,0.25);}
.ban-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.ban-slot-wrap{display:flex;flex-direction:column;gap:3px;}
.ban-slot-label{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center;}
.ban-select-wrap .hero-native-select{height:30px;color:#fca5a5;font-size:12px;border-radius:6px;padding:0 6px;}
.ban-select-wrap .hero-search-input{height:30px;color:#fca5a5;font-size:12px;border-radius:6px;padding:0 7px;}
.ban-clear{font-size:10px;padding:2px 0;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--bf);font-weight:600;letter-spacing:1px;text-transform:uppercase;text-align:center;transition:color 0.15s;}
.ban-clear:hover{color:var(--red);}

/* DRAFT TIMER */
.draft-inner{display:grid;grid-template-columns:130px minmax(0,1fr) 276px;gap:14px;align-items:center;padding:12px 16px;}
.draft-clock{text-align:center;}
.draft-phase-name{font-family:var(--hf);font-size:12px;font-weight:800;color:var(--purple);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.draft-time{font-family:var(--hf);font-size:44px;font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(245,158,11,0.4);}
.draft-time.urgent{color:var(--red);text-shadow:0 0 20px rgba(239,68,68,0.6);animation:urgPulse 0.5s ease-in-out infinite alternate;}
@keyframes urgPulse{from{opacity:1;}to{opacity:0.5;}}
.draft-prog{font-size:11px;color:var(--muted2);margin-top:3px;}
.draft-seq{display:flex;flex-wrap:wrap;gap:4px;min-width:0;overflow:hidden;}
.seq-badge{padding:3px 9px;border-radius:20px;font-family:var(--hf);font-size:11px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;background:var(--s3);color:var(--muted2);border:1px solid var(--border);transition:all 0.2s;}
.seq-badge.done{background:var(--s2);color:var(--muted);border-color:transparent;}
.seq-badge.current{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 10px rgba(139,92,246,0.4);}
.draft-controls{display:flex;flex-direction:column;gap:6px;min-width:0;width:100%;}
.draft-btn-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;width:100%;}
.draft-btn-row:first-child{grid-template-columns:2fr 1fr;}
.dbtn{min-width:0;width:100%;padding:8px 6px;border-radius:7px;border:none;cursor:pointer;font-family:var(--hf);font-size:12px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;}
.dbtn:hover{transform:translateY(-1px);filter:brightness(1.15);}
.dbtn:active{transform:none;filter:none;}
.dbtn.start{background:var(--green);color:#fff;flex:2;}
.dbtn.pause{background:var(--gold);color:#000;}
.dbtn.resume{background:var(--blue);color:#fff;}
.dbtn.reset{background:var(--red);color:#fff;}
.dbtn.nav{background:var(--s3);color:var(--muted2);border:1px solid var(--border2);}
.dbtn.nav:hover{color:var(--text);}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:50;max-width:1600px;margin:0 auto;}
.bbtn{padding:8px 18px;border-radius:7px;border:none;cursor:pointer;font-family:var(--hf);font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;}
.bbtn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.bbtn.primary{background:var(--blue);color:#fff;}
.bbtn.danger{background:var(--red);color:#fff;}
.bbtn.neutral{background:var(--s3);color:var(--muted2);border:1px solid var(--border2);}
.bbtn.neutral:hover{color:var(--text);}
.bb-sep{width:1px;height:24px;background:var(--border);}
.bb-status{font-size:12px;color:var(--muted2);margin-left:auto;font-family:var(--hf);letter-spacing:1px;}

/* Active slot highlight (from draft timer) */
.slot-active{box-shadow:0 0 0 2px var(--gold) !important;}
.slot-active .hero-native-select{border-color:var(--gold) !important;box-shadow:0 0 0 2px var(--gold);}
.slot-active .hero-search-input{border-color:var(--gold) !important;box-shadow:0 0 0 2px var(--gold);}

/* Toast */
.toast{position:fixed;bottom:66px;right:20px;background:var(--s3);color:var(--text);border:1px solid var(--border2);border-left:3px solid var(--green);padding:10px 18px;border-radius:8px;font-family:var(--hf);font-size:13px;font-weight:700;letter-spacing:0.5px;box-shadow:0 8px 24px rgba(0,0,0,0.4);transform:translateX(130%);opacity:0;transition:all 0.3s cubic-bezier(.175,.885,.32,1.275);z-index:999;}
.toast.show{transform:translateX(0);opacity:1;}
@media (max-width:1100px){
  .topbar{height:auto;min-height:50px;flex-wrap:wrap;padding:8px 12px;}
  .match-inputs{flex-wrap:wrap;}
  .preset-tools{flex-wrap:wrap;}
  .topbar-links{width:100%;margin-left:0;}
  .overlay-link-group{width:100%;flex-wrap:wrap;}
  .overlay-url-item{flex:1 1 0;min-width:150px;}
  .overlay-url-item .tlink:first-child{flex:1;}
  .main{grid-template-columns:1fr;}
  .draft-inner{grid-template-columns:1fr;align-items:stretch;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">ROV <span>|</span> CONTROL</div>
  <div class="match-inputs">
    <input id="tournamentName" value="ROV Premier League" placeholder="Tournament">
    <input id="matchTitle" value="FW VS EA : GAME 3 [BO7]" placeholder="Match Title">
    <button class="tlink" onclick="updateMatchInfo()">SAVE</button>
  </div>
  <div class="preset-tools">
    <input id="presetName" placeholder="Preset name">
    <select id="presetList"><option value="">Preset</option></select>
    <button class="tlink" onclick="savePreset()">SAVE PRESET</button>
    <button class="tlink" onclick="loadPreset()">LOAD</button>
  </div>
  <div class="topbar-links">
    <div class="overlay-link-group">
      <div class="overlay-url-item">
        <a class="tlink" href="/overlay" target="_blank">OVERLAY 1080</a>
        <button class="tlink copy-url-btn" type="button" onclick="copyOverlayUrl('/overlay')" title="Copy Overlay 1080 URL" aria-label="Copy Overlay 1080 URL">&#10697;</button>
      </div>
      <div class="overlay-url-item">
        <a class="tlink" href="/overlay-1440" target="_blank">OVERLAY 1440</a>
        <button class="tlink copy-url-btn" type="button" onclick="copyOverlayUrl('/overlay-1440')" title="Copy Overlay 1440 URL" aria-label="Copy Overlay 1440 URL">&#10697;</button>
      </div>
      <div class="overlay-url-item">
        <a class="tlink" href="/result" target="_blank">RESULT</a>
        <button class="tlink copy-url-btn" type="button" onclick="copyOverlayUrl('/result')" title="Copy Result URL" aria-label="Copy Result URL">&#10697;</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- BLUE TEAM -->
  <div class="panel blue-panel">
    <div class="panel-head">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);flex-shrink:0"></div>
      <div class="panel-title" style="color:var(--blue)">Blue Team</div>
      <div class="score-badge">
        <label>SCORE</label>
        <input class="score-input" id="blueScore" type="number" value="0" min="0">
      </div>
    </div>
    <div class="panel-body">
      <div class="team-meta">
        <div class="field"><label>Team Name</label><input id="blueTeamName" value="FW"></div>
        <button class="bbtn primary" onclick="updateTeam('teamBlue')">SAVE</button>
      </div>
      <table class="pp-table">
        <thead><tr>
          <th style="width:20px">#</th>
          <th style="text-align:left">NICKNAME</th>
          <th style="width:36px"></th>
          <th style="text-align:center">HERO PICK</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="blue_pp"></tbody>
      </table>
      <div class="ban-section">
        <div class="ban-label-row"><span>BAN</span></div>
        <div class="ban-grid" id="blue_bans"></div>
      </div>
    </div>
  </div>

  <!-- RED TEAM -->
  <div class="panel red-panel">
    <div class="panel-head">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);flex-shrink:0"></div>
      <div class="panel-title" style="color:var(--red)">Red Team</div>
      <div class="score-badge">
        <label>SCORE</label>
        <input class="score-input" id="redScore" type="number" value="2" min="0">
      </div>
    </div>
    <div class="panel-body">
      <div class="team-meta">
        <div class="field"><label>Team Name</label><input id="redTeamName" value="EA"></div>
        <button class="bbtn primary" onclick="updateTeam('teamRed')">SAVE</button>
      </div>
      <table class="pp-table">
        <thead><tr>
          <th style="width:20px">#</th>
          <th style="text-align:left">NICKNAME</th>
          <th style="width:36px"></th>
          <th style="text-align:center">HERO PICK</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="red_pp"></tbody>
      </table>
      <div class="ban-section">
        <div class="ban-label-row"><span>BAN</span></div>
        <div class="ban-grid" id="red_bans"></div>
      </div>
    </div>
  </div>

  <!-- DRAFT TIMER -->
  <div class="panel full draft-panel">
    <div class="panel-head">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--purple);box-shadow:0 0 8px var(--purple);flex-shrink:0"></div>
      <div class="panel-title" style="color:var(--purple)">Draft Timer</div>
    </div>
    <div class="draft-inner">
      <div class="draft-clock">
        <div class="draft-phase-name" id="draftPhaseLabel">READY</div>
        <div class="draft-time" id="timerDisplay">--</div>
        <div class="draft-prog" id="draftPhaseIndex">Phase 0 / 16</div>
      </div>
      <div class="draft-seq" id="draftSequenceList"></div>
      <div class="draft-controls">
        <div class="draft-btn-row">
          <button class="dbtn start" onclick="draftStart()">START</button>
          <button class="dbtn reset" onclick="draftReset()">RESET</button>
        </div>
        <div class="draft-btn-row">
          <button class="dbtn nav" onclick="draftPrev()">PREV</button>
          <button class="dbtn pause" onclick="draftPause()">PAUSE</button>
          <button class="dbtn resume" onclick="draftResume()">RESUME</button>
          <button class="dbtn nav" onclick="draftNext()">NEXT</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="bbtn neutral" onclick="switchTeams()">SWITCH TEAMS</button>
  <div class="bb-sep"></div>
  <button class="bbtn neutral" onclick="resetMatchState()">RESET MATCH</button>
  <button class="bbtn danger" onclick="clearAll()">CLEAR PICKS &amp; BANS</button>
  <div class="bb-status" id="bb_status">Ready</div>
</div>

<div class="toast" id="toast_el"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/control.js"></script>
</body>
</html>
