<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>ROV Draft Pick Overlay</title>
    <link rel="stylesheet" href="css/overlay.css">
</head>
<body>
    <div class="overlay-container">
        <!-- Top Section: Ban Phase -->
        <div class="ban-section">
            <div class="ban-left">
                <div class="ban-label">BAN</div>
                <div class="ban-heroes" id="blueBans">
                    <div class="ban-slot" data-team="teamBlue" data-index="0"></div>
                    <div class="ban-slot" data-team="teamBlue" data-index="1"></div>
                    <div class="ban-slot" data-team="teamBlue" data-index="2"></div>
                    <div class="ban-slot" data-team="teamBlue" data-index="3"></div>
                </div>
            </div>
            
            <!-- Center Match Info -->
            <div class="match-center">
                <div class="tournament-name" id="tournamentName">ROV Premier League</div>
                <div class="match-score-container">
                    <div class="team-logo-score blue">
                        <img src="images/team-logos/blue-team.png" alt="Blue Team" class="team-logo" id="blueTeamLogo" onerror="this.style.display='none'">
                        <div class="team-info">
                            <div class="team-name" id="blueTeamName">FW</div>
                        </div>
                    </div>
                    <div class="score-display">
                        <span class="score-number" id="blueScore">0</span>
                        <span class="score-separator">VS</span>
                        <span class="score-number" id="redScore">2</span>
                    </div>
                    <div class="team-logo-score red">
                        <div class="team-info">
                            <div class="team-name" id="redTeamName">EA</div>
                        </div>
                        <img src="images/team-logos/red-team.png" alt="Red Team" class="team-logo" id="redTeamLogo" onerror="this.style.display='none'">
                    </div>
                </div>
                <div class="timer-display">
                    <div id="draftLabel" style="font-size:0.5em; color:#fff; opacity:0.85; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px;"></div>
                    <span class="timer" id="timer">00:17</span>
                </div>
                <div class="match-title" id="matchTitle">FW VS EA : GAME 3 [BO7]</div>
            </div>
            
            <div class="ban-right">
                <div class="ban-label">BAN</div>
                <div class="ban-heroes" id="redBans">
                    <div class="ban-slot" data-team="teamRed" data-index="0"></div>
                    <div class="ban-slot" data-team="teamRed" data-index="1"></div>
                    <div class="ban-slot" data-team="teamRed" data-index="2"></div>
                    <div class="ban-slot" data-team="teamRed" data-index="3"></div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Section: Pick Phase -->
        <div class="pick-section">
            <!-- Team Center Info (ตรงกลาง) -->
            <div class="team-center-info">
                <div class="team-center-card blue">
                    <img src="images/team-logos/blue-team.png" alt="Blue Team" class="team-center-logo" id="blueCenterLogo" onerror="this.style.display='none'">
                    <div class="team-center-name" id="blueCenterName">FW</div>
                </div>
                <div class="team-center-card red">
                    <img src="images/team-logos/red-team.png" alt="Red Team" class="team-center-logo" id="redCenterLogo" onerror="this.style.display='none'">
                    <div class="team-center-name" id="redCenterName">EA</div>
                </div>
            </div>
            
            <!-- Blue Team (Left) -->
            <div class="team-picks blue-team">
                <div class="pick-slot" data-team="teamBlue" data-index="0">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">1</div>
                        <div class="player-name" id="bluePlayer0">NAILIU</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamBlue" data-index="1">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">2</div>
                        <div class="player-name" id="bluePlayer1">ZHAN</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamBlue" data-index="2">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">3</div>
                        <div class="player-name" id="bluePlayer2">ZHENZHE</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamBlue" data-index="3">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">4</div>
                        <div class="player-name" id="bluePlayer3">VUXIANG(C)</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamBlue" data-index="4">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">5</div>
                        <div class="player-name" id="bluePlayer4">WETZ</div>
                    </div>
                </div>
            </div>
            
            <!-- Red Team (Right) -->
            <div class="team-picks red-team">
                <div class="pick-slot" data-team="teamRed" data-index="0">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">1</div>
                        <div class="player-name" id="redPlayer0">PICHU(C)</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamRed" data-index="1">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">2</div>
                        <div class="player-name" id="redPlayer1">NEGAN</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamRed" data-index="2">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">3</div>
                        <div class="player-name" id="redPlayer2">QQ</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamRed" data-index="3">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">4</div>
                        <div class="player-name" id="redPlayer3">NBANK</div>
                    </div>
                </div>
                <div class="pick-slot" data-team="teamRed" data-index="4">
                    <div class="hero-image"></div>
                    <div class="player-info">
                        <div class="position-indicator">5</div>
                        <div class="player-name" id="redPlayer4">SRY</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/overlay.js"></script>
</body>
</html>
